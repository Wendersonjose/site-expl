<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Cliente</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
    }

    .container{
      width:350px;
      background:#fff;
      padding:40px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .container h1{
      text-align:center;
      margin-bottom:30px;
      color:#0f172a;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#334155;
      font-weight:bold;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      outline:none;
    }

    .input-group input:focus{
      border-color:#2563eb;
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      background:#2563eb;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#1d4ed8;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      font-size:14px;
      color:#64748b;
    }

    .footer a{
      color:#2563eb;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Login Cliente</h1>

    <form>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha">
      </div>

      <button class="login-btn">
        Entrar
      </button>

    </form>

    <div class="footer">
      Não possui conta?
      <a href="#">Cadastrar</a>
    </div>

  </div>

</body>
</html>
