<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EXPL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="contact-container">
        <div class="right">
            <h1 class="title">EXPL 💥</h1>
            <img class="logo" src="images/logo.png" alt="">
            <div class="form-container">
                <div class="username">
                    <img class="icon email-icon" src="icons/email.svg" alt="">
                    <input type="email" class="user-input" placeholder="E-Mail">
                </div>
                <div class="password">
                    <img class="icon password-icon" src="icons/password lock.svg" alt="">
                    <input type="password" class="pass-input" placeholder="Senha">
                </div>
                <div class="keepme">
                    <input type="checkbox" checked="true">
                    Manter conectado
                </div>
                <button type="submit" onclick="window.location.href='../dashboard/index.html'">Entrar</button>
                <a href="#" class="link">Esqueceu a senha?</a>
            </div>
        </div>
    </div>
</body>

</html>
